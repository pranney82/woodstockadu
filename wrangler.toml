# Cloudflare Pages config for woodstockadu.com
# Most settings can also be configured in the Cloudflare dashboard; this file
# lets you manage them in code. Replace database_id after you create the D1 DB.

name = "woodstockadu"
compatibility_date = "2026-06-01"
# Site files live in public/ so repo config (this file, schema.sql, package.json…)
# is not publicly served. Pages Functions stay in /functions at the repo root.
pages_build_output_dir = "public"

# D1 database binding (used by functions/api/lead.js as env.DB)
[[d1_databases]]
binding = "DB"
database_name = "woodstockadu-leads"
database_id = "3c71e7c4-a0ab-4ce6-85e8-3d803d924c32"

# Leads are stored in D1 only (no email notifications — owner opted out of Resend).
# View them: npx wrangler d1 execute woodstockadu-leads --remote \
#   --command "SELECT created_at,intent,name,email,phone,plan,estimate FROM leads ORDER BY id DESC LIMIT 20"
# TODO(owner): set the TURNSTILE_SECRET secret to turn on captcha verification
# in /api/lead:  npx wrangler pages secret put TURNSTILE_SECRET
